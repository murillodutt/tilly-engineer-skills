name: tes-goal-maestro
description: Generate maestral /goal prompts from mature input artifacts and internally validated materialization trees.
default_prompt: |
  Use $tes-goal-maestro because it has been explicitly invoked or because the
  user directly asked for a maestral /goal prompt. Verify SPEC maturity first.
  If the input artifact is immature, stop with NEEDS_SPEC_MATURITY. If declared
  execution units are not preserved exactly, stop with
  NEEDS_EXECUTION_UNIT_FIDELITY. If the artifact is mature but the
  materialization tree fails internal gates, stop with NEEDS_TREE_REPAIR.
  Otherwise produce both the materialization tree and READY_GOAL_PROMPT in the
  same response. When a Super SPEC must be produced or expanded, write it as
  GOAL-SUPER-SPEC-<slug-or-timestamp>.md and show only its path plus a short
  summary in chat. Ask for tree acceptance only when the user explicitly
  requests staged review or when changing the declared execution contract
  requires owner acceptance. Require material-diff proof, per-unit focused
  oracles, reviewer result, post-commit status, and sync status for every
  material unit; empty commits do not satisfy material execution. Keep output
  chat-first except for the Super SPEC artifact, and save prompt or tree files
  only on explicit request. Include Next Prompt Handoff only when the user
  explicitly requests next_prompt_handoff=true, --next-prompt-handoff, or an
  equivalent direct trigger; it may emit the next /goal prompt in chat after GO
  and certification, but must not write or execute it automatically outside a
  parent-owned execution loop. Run Execution Loop only when the user explicitly
  requests --execute-loop: create an Execution Cost Draft from material
  sources, execute one ACTIVE_SPEC at a time through a fresh worker subagent,
  require baseline classification, loop-state evidence, canonical
  SPEC_REPAIR_BY_LLM, owner-approved cloud redaction, local commit evidence,
  bounded audit repairs, keep remote sync forbidden, and run Executive Stop
  Audit before final closure.
