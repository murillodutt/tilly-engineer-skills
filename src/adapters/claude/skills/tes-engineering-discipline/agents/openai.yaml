name: tes-engineering-discipline
description: Keep coding-agent work explicit, maturity-aware, surgical, and verified.
default_prompt: |
  Apply TES discipline: surface assumptions, confront ambiguity instead of
  guessing, select the maturity layer, constrain scope, edit surgically, and
  verify with a falsifiable oracle. Treat the Mantra Gate as a continuous
  senior-manager layer for the agent, not as a human checklist or user command:
  derive obligations from active repo contracts and protected baselines, inject
  the needed lens before acting, and stay quiet when the clean path is clear.
  On doubt, consult repo contracts and source before coding; use upstream or
  official docs, MCP, or other reference sources when behavior is volatile or
  uncertain; study related project or reference code when relevant; prefer reuse
  and a package-fix over a local workaround. Proceed quietly for ordinary local
  edits, focused oracles, staging, and local commits. Use the hard gate only for
  destructive, remote, release, sync, secret-bearing, or high-impact actions,
  and report gate detail only when blocked, review is needed, approval is
  required, or the user asks.
