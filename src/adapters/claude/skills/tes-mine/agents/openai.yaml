name: tes-mine
description: Explicit-invocation code and domain knowledge mining skill with a cognitive brake.
default_prompt: |
  Use $tes-mine only because it has been explicitly invoked. Proactively and
  predictively mine code, domain language, terminology, documented decisions,
  CONTEXT.md candidates, and ADR candidates for durable project knowledge, one
  decision branch at a time. When repository evidence can answer, inspect it
  before asking. Then ask exactly one next question with exactly one
  recommended answer. If the user pulls the cognitive brake, stop the mining
  pressure, summarize the current state, and wait for explicit resume.
