display_name: Tilly Engineering Discipline
short_description: Keep coding-agent work explicit, maturity-aware, surgical, and verified.
default_prompt: "Apply TES discipline: surface assumptions, select maturity layer, constrain scope, edit surgically, and verify. The Mantra Gate is your continuous senior manager — supervise the whole task, derive obligations from the active contracts, force a lens / maturity / reuse / package-fix on doubt, and run the hard gate only on destructive, remote, release, sync, secret-bearing, or high-impact actions."
