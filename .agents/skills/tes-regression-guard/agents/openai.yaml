name: tes-regression-guard
description: Risk-scoped local anti-regression reference for TES development work.
default_prompt: |
  Use $tes-regression-guard only when a TES repository change can affect a
  certified, installed, materialized, generated, measured, release, CLI, public,
  or user-visible baseline. Do not load it by default for ordinary analysis,
  low-risk edits, or an owner-requested no-skill run unless a concrete
  destructive, secret, remote, release, or safety risk must be escalated. Name
  the last-known-good baseline when behavior can move, classify the intended
  delta, protect invariants, require same-input comparison evidence for risky
  changes, and stop or gate the change when the baseline cannot be protected.
