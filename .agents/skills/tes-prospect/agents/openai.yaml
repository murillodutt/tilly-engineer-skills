name: tes-prospect
description: Explicit-invocation project-stress prospecting skill with a cognitive brake.
default_prompt: |
  Use $tes-prospect only because it has been explicitly invoked. Proactively
  and predictively stress-test the plan or design at project-stress level,
  explore the codebase when it can answer a question, and ask one question at a
  time with your recommended answer. If the user pulls the cognitive brake,
  stop the pressure, summarize the current state, and wait for explicit resume.
