name: TES Field Report
description: Sanitized operational feedback from a TES runtime.
title: "TES Field Report"
labels:
  - field-report
  - privacy-sanitized
body:
  - type: markdown
    attributes:
      value: |
        Use this only for sanitized TES operational facts.
        Never include code, diffs, prompts, file contents, secrets, personal data, absolute paths, raw stack traces, raw branch names or raw remotes.
  - type: input
    id: schema
    attributes:
      label: Schema
      value: tes-field-report@2
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - PASS
        - FAIL
        - BLOCKED
        - DEGRADED
    validations:
      required: true
  - type: input
    id: report-class
    attributes:
      label: Report class
      placeholder: "version-drift, failure-or-blocker, installation-signal, cortex-certification"
    validations:
      required: true
  - type: dropdown
    id: actionability
    attributes:
      label: Actionability
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: input
    id: product-class
    attributes:
      label: Product class
      placeholder: "version-drift, helper-contract-failure, adapter-drift, mcp-activation-failure"
    validations:
      required: true
  - type: input
    id: certification-impact
    attributes:
      label: Certification impact
      placeholder: "blocks-clean-pass, partial-certification, monitor-only, none"
    validations:
      required: true
  - type: input
    id: owner-surface
    attributes:
      label: Owner surface
      placeholder: "installer, adapter, mcp, cortex, release, maintainer-triage"
    validations:
      required: true
  - type: input
    id: next-action
    attributes:
      label: Next action
      placeholder: "sanitized, bounded maintainer action"
    validations:
      required: true
  - type: input
    id: privacy-state
    attributes:
      label: Privacy state
      value: sanitized
    validations:
      required: true
  - type: input
    id: report-fingerprint
    attributes:
      label: Report fingerprint
      placeholder: "16-character sanitized report fingerprint"
    validations:
      required: true
  - type: input
    id: dedupe-fingerprint
    attributes:
      label: Dedupe fingerprint
      placeholder: "16-character sanitized dedupe fingerprint"
    validations:
      required: true
  - type: input
    id: tes-version
    attributes:
      label: TES version
      placeholder: "0.3.23"
    validations:
      required: true
  - type: textarea
    id: facts
    attributes:
      label: Sanitized facts
      description: Factual prose or bullets only. No tables and no code blocks.
      placeholder: "Actionable findings, signal score, surfaces, routes, versions, status counts, and sanitized failure category."
    validations:
      required: true
  - type: checkboxes
    id: privacy-confirmation
    attributes:
      label: Privacy confirmation
      options:
        - label: This report contains no code, diff, prompt, file content, secret, personal data, absolute path, raw stack trace, raw branch name or raw remote.
          required: true
